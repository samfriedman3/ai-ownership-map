name: Validate

# Guards the review gate: every PR (including the monitor's own) must have a
# well-formed dataset and a clean build before it can be merged.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate ownership data
        run: npm run validate-data
      - name: Build
        run: npm run build
